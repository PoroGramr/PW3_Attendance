name: Deploy to Amazon EC2

on:
  push:
    branches:
      - main  # 'main' 브랜치에 푸시될 때 워크플로우를 실행합니다.

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pw3-attendant # Docker Hub 사용자 이름과 이미지 이름을 설정합니다.

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Build with Gradle
        run: ./gradlew build -x test # 테스트는 제외하고 빌드

      - name: Rename JAR file
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar")
          echo "Found JAR file: $JAR_FILE"
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No JAR file found."
            exit 1
          fi
          mv "$JAR_FILE" app.jar
          echo "Renamed to app.jar"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-to: type=inline

  deploy-to-ec2:
    name: Deploy to EC2 instance
    runs-on: ubuntu-latest
    needs: build-and-push # 'build-and-push' 작업이 성공해야 실행됩니다.
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # --- Docker Compose V2 (docker compose) 설치 스크립트 시작 ---
            # docker compose 명령어가 존재하는지 확인하고, 없으면 설치합니다.
            if ! docker compose version &> /dev/null; then
              echo "Docker Compose V2 not found. Installing..."
              DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
              mkdir -p $DOCKER_CONFIG/cli-plugins
              # 최신 버전은 다음 링크에서 확인 가능: https://github.com/docker/compose/releases
              COMPOSE_VERSION="v2.24.6" 
              curl -SL https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
              chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
              echo "Docker Compose V2 installed successfully."
            else
              echo "Docker Compose V2 is already installed."
            fi
            # --- Docker Compose 설치 스크립트 끝 ---
            
            # .env 파일 생성
            echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env
            
            # docker-compose.yml 파일 생성 및 확인
            echo "${{ secrets.DOCKER_COMPOSE_YML }}" > docker-compose.yml
            if [ ! -s docker-compose.yml ]; then
              echo "Error: docker-compose.yml is empty. Make sure the DOCKER_COMPOSE_YML secret is set correctly in your GitHub repository settings."
              exit 1
            fi

            # Docker Hub 로그인
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # 'docker compose' (하이픈 없음) 사용
            # 최신 app 이미지를 pull
            docker compose pull app
            
            # 모든 서비스 (app, db)를 백그라운드에서 실행
            # --remove-orphans 옵션은 yml 파일에서 사라진 서비스를 컨테이너에서 삭제합니다.
            docker compose up -d --remove-orphans
            
            # 사용하지 않는 오래된 Docker 이미지 정리
            docker image prune -f
