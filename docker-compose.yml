# 실행할 서비스(컨테이너)들 정의
services:
  # MySQL 데이터베이스 서비스
  db:
    image: mysql:8.0 # MySQL 8.0 버전 이미지 사용
    container_name: pw3-mysql # 컨테이너 이름 지정
    restart: always # 컨테이너가 중지되면 항상 다시 시작
    volumes:
      - db-data:/var/lib/mysql # 데이터베이스 데이터를 영구적으로 저장하기 위한 볼륨
    ports:
      # 외부에서 MySQL에 직접 접속할 필요가 없으면 이 부분을 주석 처리하거나 삭제해도 됩니다.
      # 개발/디버깅 목적으로 남겨둘 경우, 보안에 유의해야 합니다.
      - "3306:3306"
    environment:
      # 아래 환경 변수들은 GitHub Secrets를 통해 주입될 예정입니다.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - pw3-network # 아래에 정의된 커스텀 네트워크에 연결

  # Spring Boot 애플리케이션 서비스
  app:
    # 이 이미지는 GitHub Actions에서 빌드하고 푸시한 이미지를 사용합니다.
    image: jaydenpark33/pw3-attendant:latest
    container_name: pw3-attendant-container # 컨테이너 이름 지정
    restart: always
    depends_on:
      - db # 'db' 서비스가 시작된 후에 'app' 서비스가 시작되도록 보장
    ports:
      - "8080:8080" # 호스트의 8080 포트와 컨테이너의 8080 포트를 연결
    environment:
      # Spring Boot가 'db' 컨테이너에 접속하기 위한 설정
      # 서비스 이름 'db'가 바로 컨테이너의 호스트 이름이 됩니다.
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # 나머지 애플리케이션 환경 변수들
      COOLSMS_API_KEY: ${COOLSMS_API_KEY}
      COOLSMS_SECRET_KEY: ${COOLSMS_SECRET_KEY}
      COOLSMS_SENDER_NUMBER: ${COOLSMS_SENDER_NUMBER}
      IMGBB_API_KEY: ${IMGBB_API_KEY}
      REPORT_RECIPIENT_PHONE_NUMBER: ${REPORT_RECIPIENT_PHONE_NUMBER}
    networks:
      - pw3-network

# 컨테이너 간 통신을 위한 커스텀 네트워크 정의
networks:
  pw3-network:
    driver: bridge

# 데이터베이스 데이터를 저장할 명명된 볼륨 정의
volumes:
  db-data:
