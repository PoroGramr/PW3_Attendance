<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 출석 QR 코드</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #student-name { font-size: 1.5em; margin: 20px 0; color: #555; }
        #qr-code { margin-top: 20px; }
        #download-btn { margin-top: 30px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        #download-btn:hover { background-color: #0056b3; }
        .error { color: red; }
    </style>
    <!-- QR Code Generation Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <h1>출석용 QR 코드</h1>
    <div id="student-name">로딩 중...</div>
    <div id="student-class-info"></div>
    <div id="qr-code"></div>
    <button id="download-btn" style="display: none;">QR 코드 저장</button>
    <div id="error-message" class="error"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const path = window.location.pathname;
        const parts = path.split('/');
        // Expecting URL structure like /s/{qrSecret}
        const qrSecret = parts[2];

        const studentNameEl = document.getElementById('student-name');
        const studentClassInfoEl = document.getElementById('student-class-info');
        const qrCodeEl = document.getElementById('qr-code');
        const downloadBtn = document.getElementById('download-btn');
        const errorEl = document.getElementById('error-message');

        if (!qrSecret) {
            studentNameEl.style.display = 'none';
            errorEl.textContent = '유효하지 않은 접근입니다.';
            return;
        }

        fetch(`/api/public/qr/resolve?secret=${qrSecret}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('학생 정보를 찾을 수 없습니다. QR 코드가 유효한지 확인해주세요.');
                }
                return response.json();
            })
            .then(data => {
                studentNameEl.textContent = `${data.student.name} 학생`;

                if (data.currentClass) {
                    studentClassInfoEl.textContent = `${data.currentClass.schoolType} ${data.currentClass.grade}학년 ${data.currentClass.classNumber}반`;
                } else {
                    studentClassInfoEl.textContent = '현재 학년/반 정보 없음';
                }

                const qrPayload = data.qrPayload;

                // Generate QR Code
                QRCode.toCanvas(qrPayload, { width: 256, errorCorrectionLevel: 'H' }, function (err, canvas) {
                    if (err) throw err;
                    qrCodeEl.appendChild(canvas);
                    downloadBtn.style.display = 'block';

                    // Setup download button
                    downloadBtn.addEventListener('click', () => {
                        const link = document.createElement('a');
                        link.download = `${data.student.name}_QR_Code.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    });
                });
            })
            .catch(error => {
                studentNameEl.style.display = 'none';
                studentClassInfoEl.style.display = 'none';
                errorEl.textContent = error.message;
            });
    });
</script>

</body>
</html>
